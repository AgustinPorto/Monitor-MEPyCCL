name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Security check
        run: ./security_check.sh

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.CLOUDFLARE_API_TOKEN }}"
          test -n "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"
          test -n "${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}"
          test -n "${{ secrets.CLOUDFLARE_KV_PREVIEW_ID }}"

      - name: Inject KV IDs into wrangler.toml
        run: |
          sed -i "s/__REEMPLAZAR_CON_KV_NAMESPACE_ID__/${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}/g" wrangler.toml
          sed -i "s/__REEMPLAZAR_CON_KV_PREVIEW_ID__/${{ secrets.CLOUDFLARE_KV_PREVIEW_ID }}/g" wrangler.toml

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
