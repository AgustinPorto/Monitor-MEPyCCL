name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Security check
        run: ./security_check.sh

      - name: Lint (if present)
        run: |
          if node -e "const s=require('./package.json').scripts||{};process.exit(s.lint?0:1)"; then
            npm run lint
          else
            echo "lint script not found; skipping"
          fi

      - name: Typecheck (if present)
        run: |
          if node -e "const s=require('./package.json').scripts||{};process.exit((s.typecheck||s['type-check'])?0:1)"; then
            if node -e "const s=require('./package.json').scripts||{};process.exit(s.typecheck?0:1)"; then
              npm run typecheck
            else
              npm run type-check
            fi
          else
            echo "typecheck script not found; skipping"
          fi

      - name: Tests
        run: npm test

      - name: Syntax check
        run: npm run check

      - name: Build (if present)
        run: |
          if node -e "const s=require('./package.json').scripts||{};process.exit(s.build?0:1)"; then
            npm run build
          else
            echo "build script not found; skipping"
          fi

      - name: Check dashboard embed sync
        run: npm run check:dashboard-embed

  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "Falta secret: CLOUDFLARE_API_TOKEN"
            missing=1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "Falta secret: CLOUDFLARE_ACCOUNT_ID"
            missing=1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}" ]; then
            echo "Falta secret: CLOUDFLARE_KV_NAMESPACE_ID"
            missing=1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_KV_PREVIEW_ID }}" ]; then
            echo "Falta secret: CLOUDFLARE_KV_PREVIEW_ID"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Inject KV IDs into wrangler.toml
        run: |
          sed -i "s/__REEMPLAZAR_CON_KV_NAMESPACE_ID__/${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}/g" wrangler.toml
          sed -i "s/__REEMPLAZAR_CON_KV_PREVIEW_ID__/${{ secrets.CLOUDFLARE_KV_PREVIEW_ID }}/g" wrangler.toml

      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
