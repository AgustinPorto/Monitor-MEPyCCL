name: Publish Dashboard

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # 10:30-17:59 ART (UTC-3) => 13:30-20:59 UTC, cada 5 minutos
    - cron: "30-59/5 13 * * 1-5"
    - cron: "*/5 14-20 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zsh
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh

      - name: Generate dashboard
        run: |
          chmod +x ./monitor.sh
          OUTPUT_HTML="$GITHUB_WORKSPACE/public/dashboard.html" ENV_FILE=/tmp/nonexistent ./monitor.sh || echo "No se pudo actualizar datos; se mantiene dashboard previo."

      - name: Security check
        run: ./security_check.sh

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
