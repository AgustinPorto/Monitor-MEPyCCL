name = "monitor-mep-ccl"
main = "src/index.js"
compatibility_date = "2026-02-23"
workers_dev = true

[vars]
EMAIL_ALERTS_ENABLED = "false"
ALERT_COOLDOWN_MINUTES = "120"
WORKER_PUBLIC_URL = "https://monitor-mep-ccl.agustin-esteban-porto.workers.dev"

[triggers]
crons = [
  "30-59/5 13 * * MON-FRI",
  "*/5 14-20 * * MON-FRI"
]

[[kv_namespaces]]
binding = "MONITOR_KV"
id = "__REEMPLAZAR_CON_KV_NAMESPACE_ID__"
preview_id = "__REEMPLAZAR_CON_KV_PREVIEW_ID__"
